<div class="min-h-[calc(100vh-180px)] flex items-center justify-center p-8 md:p-12 relative overflow-hidden">
  <!-- Background Decorative Cards -->
  <div class="absolute inset-0 pointer-events-none opacity-10">
    <!-- Top Left Card -->
    <div class="absolute top-10 left-10 w-20 h-28 bg-gradient-to-br from-white to-gray-50 rounded-xl shadow-xl border-2 border-gray-300 -rotate-12">
      <div class="absolute inset-1 border border-gray-200 rounded-lg"></div>
      <div class="absolute inset-0 flex items-center justify-center">
        <span class="text-5xl font-black text-gray-800">3</span>
      </div>
    </div>
    
    <!-- Top Right Card -->
    <div class="absolute top-20 right-16 w-20 h-28 bg-gradient-to-br from-white to-gray-50 rounded-xl shadow-xl border-2 border-gray-300 rotate-12">
      <div class="absolute inset-1 border border-gray-200 rounded-lg"></div>
      <div class="absolute inset-0 flex items-center justify-center">
        <span class="text-5xl font-black text-gray-800">8</span>
      </div>
    </div>
    
    <!-- Bottom Left Card -->
    <div class="absolute bottom-16 left-20 w-20 h-28 bg-gradient-to-br from-white to-gray-50 rounded-xl shadow-xl border-2 border-gray-300 rotate-6">
      <div class="absolute inset-1 border border-gray-200 rounded-lg"></div>
      <div class="absolute inset-0 flex items-center justify-center">
        <span class="text-5xl font-black text-gray-800">5</span>
      </div>
    </div>
    
    <!-- Bottom Right Card -->
    <div class="absolute bottom-10 right-10 w-20 h-28 bg-gradient-to-br from-white to-gray-50 rounded-xl shadow-xl border-2 border-gray-300 -rotate-6">
      <div class="absolute inset-1 border border-gray-200 rounded-lg"></div>
      <div class="absolute inset-0 flex items-center justify-center">
        <span class="text-5xl font-black text-gray-800">13</span>
      </div>
    </div>
    
    <!-- Desktop Only Cards -->
    <!-- Left Middle Card -->
    <div class="hidden lg:block absolute top-1/2 left-32 -translate-y-1/2 w-20 h-28 bg-gradient-to-br from-white to-gray-50 rounded-xl shadow-xl border-2 border-gray-300 -rotate-3">
      <div class="absolute inset-1 border border-gray-200 rounded-lg"></div>
      <div class="absolute inset-0 flex items-center justify-center">
        <span class="text-5xl font-black text-gray-800">1</span>
      </div>
    </div>
    
    <!-- Right Middle Card -->
    <div class="hidden lg:block absolute top-1/2 right-32 -translate-y-1/2 w-20 h-28 bg-gradient-to-br from-white to-gray-50 rounded-xl shadow-xl border-2 border-gray-300 rotate-3">
      <div class="absolute inset-1 border border-gray-200 rounded-lg"></div>
      <div class="absolute inset-0 flex items-center justify-center">
        <span class="text-5xl font-black text-gray-800">21</span>
      </div>
    </div>
    
    <!-- Top Center Left Card -->
    <div class="hidden xl:block absolute top-24 left-1/4 w-20 h-28 bg-gradient-to-br from-white to-gray-50 rounded-xl shadow-xl border-2 border-gray-300 rotate-6">
      <div class="absolute inset-1 border border-gray-200 rounded-lg"></div>
      <div class="absolute inset-0 flex items-center justify-center">
        <span class="text-5xl font-black text-gray-800">2</span>
      </div>
    </div>
    
    <!-- Top Center Right Card -->
    <div class="hidden xl:block absolute top-24 right-1/4 w-20 h-28 bg-gradient-to-br from-white to-gray-50 rounded-xl shadow-xl border-2 border-gray-300 -rotate-6">
      <div class="absolute inset-1 border border-gray-200 rounded-lg"></div>
      <div class="absolute inset-0 flex items-center justify-center">
        <span class="text-4xl font-black text-gray-800">?</span>
      </div>
    </div>
  </div>
  
  <div class="w-full max-w-md relative z-10">
    <div class="bg-white rounded-2xl shadow-xl p-8">
      <div class="text-center mb-8">
        <h1 class="text-4xl font-bold text-gray-900 mb-2">Planning Poker</h1>
        <p class="text-gray-600 mb-4">Join your Agile team session</p>
        <div class="flex flex-wrap justify-center gap-3 text-sm text-gray-600">
          <span class="flex items-center gap-1">✓ 100% Free</span>
          <span class="flex items-center gap-1">✓ Fast & Easy</span>
          <span class="flex items-center gap-1">✓ No Registration</span>
          <span class="flex items-center gap-1">✓ Unlimited Sessions</span>
          <span class="flex items-center gap-1">✓ Fully Responsive</span>
        </div>
      </div>

      <div class="space-y-6">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Your Name</label>
          <input
            type="text"
            [(ngModel)]="userName"
            placeholder="Enter your name"
            autocomplete="name"
            autocapitalize="words"
            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition text-base"
          />
        </div>

        <div *ngIf="errorMessage" class="p-3 bg-red-50 border border-red-200 rounded-lg">
          <p class="text-sm text-red-600">{{ errorMessage }}</p>
        </div>

        <!-- Show Join button if roomId exists from URL -->
        <button
          *ngIf="roomId"
          (click)="joinSession()"
          (touchstart)="joinSession()"
          [disabled]="!userName.trim()"
          class="w-full py-3 px-4 bg-primary text-white font-semibold rounded-lg hover:bg-red-700 transition shadow-lg disabled:bg-disabled disabled:cursor-not-allowed touch-manipulation"
          style="touch-action: manipulation; -webkit-tap-highlight-color: transparent;"
        >
          Join Session
        </button>

        <!-- Show Create button if no roomId -->
        <button
          *ngIf="!roomId"
          (click)="createSession()"
          (touchstart)="createSession()"
          [disabled]="!userName.trim()"
          class="w-full py-3 px-4 bg-primary text-white font-semibold rounded-lg hover:bg-red-700 transition shadow-lg disabled:bg-disabled disabled:cursor-not-allowed touch-manipulation"
          style="touch-action: manipulation; -webkit-tap-highlight-color: transparent;"
        >
          Create New Session
        </button>
      </div>
    </div>
  </div>
</div>
